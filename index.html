<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body { background-color: #f8f9fa; padding: 20px; }
      .container { max-width: 500px; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
  </head>
  <body>
    <div class="container">
      <h2 class="text-primary mb-4">Registro de Buzo - EDC</h2>
      <form id="formRegistro">
        <div class="mb-3">
          <label class="form-label">Nombre</label>
          <input type="text" name="nombre" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">DNI</label>
          <input type="text" name="dni" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Registrar</button>
      </form>
      <div id="mensaje" class="mt-3 text-center fw-bold"></div>
    </div>

    <script>
      document.getElementById('formRegistro').onsubmit = function(e) {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        btn.disabled = true;
        btn.innerText = "Procesando...";

        // Llamada a la función del archivo .gs
        google.script.run
          .withSuccessHandler(function(res) {
            document.getElementById('mensaje').innerText = res;
            e.target.reset();
            btn.disabled = false;
            btn.innerText = "Registrar";
          })
          .registrarBuzo(this);
      };
    </script>
  </body>
</html>

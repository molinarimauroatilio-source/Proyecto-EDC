<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f0f2f5; padding-top: 30px; font-size: 14px; }
    .header-panel {
      background: #0d3a6e;
      color: white;
      padding: 20px 30px;
      border-radius: 10px;
      margin-bottom: 25px;
    }
    .badge-pendiente { background-color: #ffc107; color: #000; }
    .badge-aprobado  { background-color: #198754; }
    .badge-rechazado { background-color: #dc3545; }
    .badge-suspendido { background-color: #6c757d; }
    th { background-color: #0d3a6e; color: white; }
  </style>
</head>
<body>
<div class="container-fluid px-4">
  
  <div class="header-panel d-flex justify-content-between align-items-center">
    <div>
      <h4 class="mb-0">⚓ Panel ABP — Gestión de Buzos</h4>
      <small>Sindicato de Buzos Profesionales · Sistema EDC</small>
    </div>
    <div>
      <span id="contador" class="badge bg-light text-dark fs-6">Cargando...</span>
    </div>
  </div>

  <!-- Filtros -->
  <div class="row mb-3">
    <div class="col-md-4">
      <input type="text" id="buscador" class="form-control" placeholder="Buscar por nombre, DNI o libreta...">
    </div>
    <div class="col-md-3">
      <select id="filtroEstado" class="form-select">
        <option value="">Todos los estados</option>
        <option value="PENDIENTE">PENDIENTE</option>
        <option value="APROBADO">APROBADO</option>
        <option value="RECHAZADO">RECHAZADO</option>
        <option value="SUSPENDIDO">SUSPENDIDO</option>
      </select>
    </div>
    <div class="col-md-2">
      <button class="btn btn-outline-secondary w-100" onclick="cargarBuzos()">🔄 Actualizar</button>
    </div>
  </div>

  <!-- Tabla -->
  <div class="table-responsive">
    <table class="table table-bordered table-hover bg-white shadow-sm rounded">
      <thead>
        <tr>
          <th>#</th>
          <th>Fecha</th>
          <th>Nombre</th>
          <th>DNI</th>
          <th>Libreta</th>
          <th>Email</th>
          <th>Celular</th>
          <th>Estado</th>
          <th>Acción</th>
        </tr>
      </thead>
      <tbody id="tablaBuzos">
        <tr><td colspan="9" class="text-center text-muted">Cargando datos...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script>
let todosLosBuzos = [];

function cargarBuzos() {
  document.getElementById('tablaBuzos').innerHTML = 
    '<tr><td colspan="9" class="text-center"><span class="spinner-border spinner-border-sm"></span> Cargando...</td></tr>';
  
  google.script.run
    .withSuccessHandler(renderizarTabla)
    .withFailureHandler(err => {
      document.getElementById('tablaBuzos').innerHTML = 
        '<tr><td colspan="9" class="text-danger">Error: ' + err + '</td></tr>';
    })
    .obtenerBuzos();
}

function renderizarTabla(buzos) {
  todosLosBuzos = buzos;
  document.getElementById('contador').textContent = buzos.length + ' buzos registrados';
  filtrarYMostrar();
}

function filtrarYMostrar() {
  const texto = document.getElementById('buscador').value.toLowerCase();
  const estado = document.getElementById('filtroEstado').value;
  
  const filtrados = todosLosBuzos.filter(b => {
    const coincideTexto = !texto || 
      (b.nombre + ' ' + b.apellido).toLowerCase().includes(texto) ||
      String(b.dni).includes(texto) ||
      String(b.libreta).toLowerCase().includes(texto);
    const coincideEstado = !estado || b.estado === estado;
    return coincideTexto && coincideEstado;
  });

  const tbody = document.getElementById('tablaBuzos');
  if (filtrados.length === 0) {
    tbody.innerHTML = '<tr><td colspan="9" class="text-center text-muted">Sin resultados</td></tr>';
    return;
  }

  tbody.innerHTML = filtrados.map((b, idx) => {
    const badgeClass = {
      'PENDIENTE': 'badge-pendiente',
      'APROBADO': 'badge-aprobado text-white',
      'RECHAZADO': 'badge-rechazado text-white',
      'SUSPENDIDO': 'badge-suspendido text-white'
    }[b.estado] || 'bg-secondary text-white';

    const fecha = b.timestamp ? new Date(b.timestamp).toLocaleDateString('es-AR') : '-';

    return `<tr>
      <td>${idx + 1}</td>
      <td>${fecha}</td>
      <td><strong>${b.nombre} ${b.apellido}</strong></td>
      <td>${b.dni}</td>
      <td>${b.libreta}</td>
      <td><a href="mailto:${b.email}">${b.email}</a></td>
      <td>${b.celular}</td>
      <td><span class="badge ${badgeClass}">${b.estado}</span></td>
      <td>
        <select class="form-select form-select-sm" onchange="cambiarEstado(${b.fila}, this.value)" style="min-width:130px">
          <option value="">— Cambiar —</option>
          <option value="APROBADO">✅ Aprobar</option>
          <option value="PENDIENTE">🕐 Pendiente</option>
          <option value="RECHAZADO">❌ Rechazar</option>
          <option value="SUSPENDIDO">⏸ Suspender</option>
        </select>
      </td>
    </tr>`;
  }).join('');
}

function cambiarEstado(fila, nuevoEstado) {
  if (!nuevoEstado) return;
  if (!confirm('¿Cambiar estado a ' + nuevoEstado + '?')) return;
  
  google.script.run
    .withSuccessHandler(() => cargarBuzos())
    .withFailureHandler(err => alert('Error: ' + err))
    .cambiarEstado(fila, nuevoEstado);
}

// Filtros en tiempo real
document.getElementById('buscador').addEventListener('input', filtrarYMostrar);
document.getElementById('filtroEstado').addEventListener('change', filtrarYMostrar);

// Carga inicial
cargarBuzos();
</script>
</body>
</html>

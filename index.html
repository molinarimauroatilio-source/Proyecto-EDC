<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { 
      background-color: #e9ecef; /* Gris claro de fondo para que resalte el cuadro */
      padding-top: 50px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 14px; /* Un poco más que 12 para legibilidad web */
    }
    .card-custom {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 40px;
      border-radius: 15px; /* Bordes redondeados */
      box-shadow: 0 10px 30px rgba(0,0,0,0.15); /* Sombra elegante */
      border: 1px solid #dee2e6;
    }
    .form-label {
      font-weight: bold; /* Negritas en las etiquetas */
      color: #495057;
      margin-bottom: 5px;
    }
    .header-section {
      text-align: center;
      margin-bottom: 30px;
      border-bottom: 3px solid #0d6efd;
      padding-bottom: 15px;
    }
    .btn-primary {
      font-weight: bold;
      letter-spacing: 1px;
      padding: 12px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="card-custom">
      
      <div class="header-section">
        <h2 class="text-primary"><strong>PROYECTO EDC</strong></h2>
        <p class="text-muted">Ecosistema Digital de Certificaciones</p>
      </div>

      <form id="formRegistro">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" name="nombre" class="form-control" placeholder="Ej: Juan" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Apellido</label>
            <input type="text" name="apellido" class="form-control" placeholder="Ej: Perez" required>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">DNI</label>
            <input type="number" name="dni" class="form-control" placeholder="Sin puntos" required>
          </div>
         <div class="col-md-6 mb-3">
  <label class="form-label">Libreta N°</label>
  <input type="text" 
         name="libreta" 
         class="form-control" 
         placeholder="Máx. 4 números" 
         maxlength="4" 
         pattern="\d{1,4}" 
         title="Solo se permiten hasta 4 números sin los 0 iniciales" 
         required>
</div>
        </div>

        <div class="mb-3">
          <label class="form-label">Correo Electrónico</label>
          <input type="email" name="email" class="form-control" placeholder="correo@ejemplo.com" required>
        </div>

       <div class="mb-3">
  <label class="form-label">Teléfono Celular (10 dígitos)</label>
  <input type="tel" 
         name="celular" 
         class="form-control" 
         placeholder="Ej: 1122334455 (Sin 0 ni 15)" 
         minlength="10" 
         maxlength="10" 
         pattern="[0-9]{10}" 
         title="Deben ser exactamente 10 números (Cod. área + número, sin 0 ni 15)" 
         required>
  <div class="form-text text-muted">Ejemplo: 11 + 8 números (Capital) o 221 + 7 números (La Plata).</div>
</div>

        <div class="mt-4">
          <button type="submit" class="btn btn-primary w-100 shadow-sm">
            <strong>FINALIZAR REGISTRO</strong>
          </button>
        </div>
      </form>

      <div id="mensaje" class="mt-4 text-center alert d-none"></div>
      
      <div class="text-center mt-3">
        <small class="text-muted">Sindicato ABP - Sistema de Asignación Transparente</small>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('formRegistro').onsubmit = function(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      const msgDiv = document.getElementById('mensaje');
      
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Guardando...';

      google.script.run
      .withSuccessHandler(function(res) {
  const urlLogin = 'https://script.google.com/macros/s/AKfycbzMg6OVrhKYQTa5imfDw6ON3334Z4pEcOAsEQeEHPf5kylQXuFb5yQWwthbIAroRe73ZQ/exec';
  msgDiv.innerHTML = res.ok 
    ? res.msg + '<br><br><a href="' + urlLogin + '" class="btn btn-success btn-sm mt-2">→ Ingresar al Panel</a>'
    : res.msg;
  msgDiv.classList.remove('d-none', res.ok ? 'alert-danger' : 'alert-success');
  msgDiv.classList.add(res.ok ? 'alert-success' : 'alert-danger');
  if (res.ok) e.target.reset();
  btn.disabled = false;
  btn.innerText = "FINALIZAR REGISTRO";
})
        .withFailureHandler(function(err) {
          msgDiv.innerText = "Error: " + err;
          msgDiv.classList.remove('d-none', 'alert-success');
          msgDiv.classList.add('alert-danger');
          btn.disabled = false;
          btn.innerText = "REINTENTAR";
        })
        .registrarBuzo(this);
    };
  </script>
</body>
</html>

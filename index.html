<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body { background-color: #f8f9fa; padding: 20px; font-family: sans-serif; }
      .container { max-width: 600px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
      .header-logo { color: #0d6efd; font-weight: bold; border-bottom: 2px solid #0d6efd; margin-bottom: 25px; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header-logo text-center">
        <h2>PROYECTO EDC - REGISTRO</h2>
      </div>
      <form id="formRegistro">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" name="nombre" class="form-control" placeholder="Ej: Juan" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Apellido</label>
            <input type="text" name="apellido" class="form-control" placeholder="Ej: Perez" required>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">DNI</label>
          <input type="number" name="dni" class="form-control" placeholder="Solo números" required>
        </div>
        <div class="mb-3">
  <label class="form-label">Libreta N°</label>
  <input type="text" name="libreta" class="form-control" placeholder="Ej: 12345-P" required>
</div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" placeholder="nombre@ejemplo.com" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Celular</label>
          <input type="tel" name="celular" class="form-control" placeholder="Cod. Area + Numero" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2">Finalizar Registro</button>
      </form>
      <div id="mensaje" class="mt-4 text-center alert d-none"></div>
    </div>

    <script>
      document.getElementById('formRegistro').onsubmit = function(e) {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        const msgDiv = document.getElementById('mensaje');
        
        btn.disabled = true;
        btn.innerText = "Guardando en el sistema...";

        google.script.run
          .withSuccessHandler(function(res) {
            msgDiv.innerText = res;
            msgDiv.classList.remove('d-none', 'alert-danger');
            msgDiv.classList.add('alert-success');
            e.target.reset();
            btn.disabled = false;
            btn.innerText = "Finalizar Registro";
          })
          .withFailureHandler(function(err) {
            msgDiv.innerText = "Error: " + err;
            msgDiv.classList.remove('d-none', 'alert-success');
            msgDiv.classList.add('alert-danger');
            btn.disabled = false;
          })
          .registrarBuzo(this);
      };
    </script>
  </body>
</html>

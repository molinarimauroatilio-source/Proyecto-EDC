<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #e9ecef; padding-top: 60px; font-family: 'Segoe UI', sans-serif; }
    .card-login {
      max-width: 440px; margin: auto; background: white;
      padding: 40px; border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }
    .header-section {
      text-align: center; margin-bottom: 30px;
      border-bottom: 3px solid #0d3a6e; padding-bottom: 15px;
    }
    .form-label { font-weight: bold; color: #495057; }
  </style>
</head>
<body>
<div class="container">
  <div class="card-login">
    <div class="header-section">
      <h4 class="text-primary"><strong>⚓ Panel del Buzo</strong></h4>
      <p class="text-muted mb-0">Ecosistema Digital de Certificaciones</p>
      <small class="text-muted">Sindicato ABP</small>
    </div>

    <div class="alert alert-info py-2 small mb-3">
      📌 Usá siempre el email con el que te registraste. Si necesitás corregirlo, contactá a ABP.
    </div>

    <div id="formLogin">
      <div class="mb-3">
        <label class="form-label">Correo Electrónico</label>
        <input type="email" id="email" class="form-control" placeholder="correo@ejemplo.com">
      </div>
      <div class="mb-3">
        <label class="form-label">DNI</label>
        <input type="number" id="dni" class="form-control" placeholder="Sin puntos">
      </div>
      <div class="mb-3">
        <label class="form-label">Libreta N°</label>
        <input type="text" id="libreta" class="form-control" placeholder="Ej: 12345-P">
      </div>
      <button onclick="ingresar()" class="btn btn-primary w-100 fw-bold mt-2">
        INGRESAR
      </button>
    </div>

    <div id="mensaje" class="mt-3 alert d-none"></div>

    <div class="text-center mt-4">
      <small class="text-muted">¿No estás registrado? 
        <a href="javascript:void(0)" onclick="irARegistro()">Registrate acá</a>
      </small>
    </div>
  </div>
</div>

<script>
function irARegistro() {
  window.top.location.href = 'https://script.google.com/macros/s/AKfycbx9tKI5vfURCGZ5wyicaqtAf_jOTn5G1bp4nA8ANVkRaorO5h3N6udTGgB4G9kKBBUetg/exec?pagina=registro';
}

function ingresar() {
  const email   = document.getElementById('email').value.trim();
  const dni     = document.getElementById('dni').value.trim();
  const libreta = document.getElementById('libreta').value.trim();
  const msg     = document.getElementById('mensaje');

  if (!email || !dni || !libreta) {
    msg.textContent = 'Completá todos los campos.';
    msg.className = 'mt-3 alert alert-warning';
    return;
  }

  msg.textContent = 'Verificando...';
  msg.className = 'mt-3 alert alert-info';

  google.script.run
    .withSuccessHandler(function(res) {
      if (res.ok) {
        sessionStorage.setItem('buzo', JSON.stringify(res));
        google.script.run
          .withSuccessHandler(function(url) { window.top.location.href = url; })
          .getPanelUrl();
      } else {
        msg.textContent = res.msg;
        msg.className = 'mt-3 alert alert-danger';
      }
    })
    .withFailureHandler(function(err) {
      msg.textContent = 'Error: ' + JSON.stringify(err);
      msg.className = 'mt-3 alert alert-danger';
    })
    .loginBuzo(email, dni, libreta);
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; padding-top: 50px; font-family: sans-serif; }
    .card-login { max-width: 400px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
<div class="container">
  <div class="card-login">
    <div class="text-center mb-4">
      <h4 class="text-primary">⚓ <strong>Acceso EDC</strong></h4>
      <small class="text-muted">Sindicato ABP</small>
    </div>

    <div class="mb-3">
      <label class="form-label small fw-bold">Email</label>
      <input type="email" id="email" class="form-control">
    </div>
    <div class="mb-3">
      <label class="form-label small fw-bold">DNI</label>
      <input type="number" id="dni" class="form-control">
    </div>
    <div class="mb-3">
      <label class="form-label small fw-bold">Libreta N°</label>
      <input type="text" id="libreta" class="form-control">
    </div>
    
    <button type="button" onclick="ingresar()" id="btnIngresar" class="btn btn-primary w-100 fw-bold mt-3">
      INGRESAR
    </button>
    
    <div id="mensaje" class="mt-3 alert d-none"></div>

    <div class="text-center mt-3">
      <small class="text-muted">
        <a href="<?= ScriptApp.getService().getUrl() ?>?pagina=registro">Registrate acá</a>
      </small>
    </div>
  </div>
</div>

<script>
  function ingresar() {
    var email = document.getElementById('email').value.trim();
    var dni = document.getElementById('dni').value.trim();
    var libreta = document.getElementById('libreta').value.trim();
    var btn = document.getElementById('btnIngresar');
    var msg = document.getElementById('mensaje');

    if (!email || !dni || !libreta) {
      msg.className = "mt-3 alert alert-danger";
      msg.innerText = "Completá todos los campos.";
      return;
    }

    btn.disabled = true;
    btn.innerText = "Verificando...";
    msg.className = "d-none";

    google.script.run
      .withSuccessHandler(function(res) {
        if (res.ok) {
          window.location.href = "<?= ScriptApp.getService().getUrl() ?>?pagina=buzo_panel&fila=" + res.fila;
        } else {
          msg.className = "mt-3 alert alert-danger";
          msg.innerText = res.msg;
          btn.disabled = false;
          btn.innerText = "INGRESAR";
        }
      })
      .withFailureHandler(function(err) {
        msg.className = "mt-3 alert alert-danger";
        msg.innerText = "Error de servidor.";
        btn.disabled = false;
        btn.innerText = "INGRESAR";
      })
      .loginBuzo(email, dni, libreta);
  }
</script>
</body>
</html>
}
</script>
</body>
</html>
